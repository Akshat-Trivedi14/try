services:
  - type: web
    name: portfolio-api
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y \
      libpango-1.0-0 \
      libpangoft2-1.0-0 \
      libcairo2 \
      libffi-dev \
      shared-mime-info \
      && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
